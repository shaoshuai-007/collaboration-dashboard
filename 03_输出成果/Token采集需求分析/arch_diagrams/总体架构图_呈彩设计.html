<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token采集系统总体架构图 - Infographic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1926 100%);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #container {
      width: 100%;
      height: 100%;
      min-height: 800px;
    }
    .export-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #C93832 0%, #006EBD 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(201, 56, 50, 0.4);
      z-index: 1000;
      transition: all 0.3s ease;
    }
    .export-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 56, 50, 0.6);
    }
    .watermark {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <button class="export-btn" onclick="exportSVG()">导出SVG</button>
  <div class="watermark">呈彩设计 | 指南针工程</div>
  <div id="container"></div>
  <script src="https://unpkg.com/@antv/infographic@latest/dist/infographic.min.js"></script>
  <script>
    const infographic = new AntVInfographic.Infographic({
      container: '#container',
      width: '100%',
      height: '100%',
    });

    const syntax = `infographic hierarchy-tree-tech-style-badge-card
data
  title Token采集系统总体架构
  desc 四层架构体系 · 数据全生命周期管理
  root
    label Token采集系统
    children
      - label 数据应用层
        desc 第四层
        icon chart dashboard
        children
          - label Token统计Dashboard
            icon chart bar
          - label 成本分析Dashboard
            icon chart pie
          - label 效果评估Dashboard
            icon chart line
          - label 可视化报表
            icon file chart
          - label 数据查询API
            icon api
      - label 数据处理层
        desc 第三层
        icon database process
        children
          - label 数据清洗
            icon filter
          - label 数据转换
            icon sync
          - label 数据入库
            icon database import
          - label 数据汇总
            icon chart timeline
      - label 数据采集层
        desc 第二层
        icon cloud download
        children
          - label SFTP接收
            icon server
          - label 文件解析
            icon file search
          - label 文件校验
            icon check circle
          - label 回执生成
            icon file check
      - label 数据源层
        desc 第一层
        icon database
        children
          - label 总部部门
            desc 23个
            icon office building
          - label 专业公司
            desc 26个
            icon domain
          - label 省公司
            desc 31个
            icon map marker
          - label 直属机构
            desc 6个
            icon account balance
      - label 支撑体系
        desc 安全保障
        icon shield lock
        children
          - label 监控告警
            icon bell alert
          - label 日志管理
            icon text box
          - label 配置管理
            icon cog
          - label 访问控制
            icon account lock
          - label 数据加密
            icon lock
theme
  palette #C93832 #006EBD #E74C3C #3498DB #1ABC9C #F39C12 #9B59B6 #34495E`;

    document.fonts?.ready.then(() => {
      infographic.render(syntax);
    }).catch((error) => {
      console.error('Error waiting for fonts to load:', error);
      infographic.render(syntax);
    });

    async function exportSVG() {
      try {
        const svgDataUrl = await infographic.toDataURL({ type: 'svg' });
        const link = document.createElement('a');
        link.download = 'Token采集系统总体架构图.svg';
        link.href = svgDataUrl;
        link.click();
      } catch (error) {
        console.error('Export error:', error);
        alert('导出失败，请稍后重试');
      }
    }
  </script>
</body>
</html>
