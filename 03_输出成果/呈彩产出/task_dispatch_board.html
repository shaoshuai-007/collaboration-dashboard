<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九星智囊团 - 任务调度看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --ct-red: #C93832;
            --ct-blue: #006EBD;
            --ct-red-light: #E85A54;
            --ct-blue-light: #3399DD;
            --bg-dark: #1a1d23;
            --bg-card: #242830;
            --bg-card-hover: #2a2f38;
            --text-primary: #ffffff;
            --text-secondary: #a0a8b8;
            --text-muted: #6b7280;
            --border-color: #3a3f4a;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--ct-blue) 0%, var(--ct-red) 100%);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }
        
        .header-title p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .datetime {
            text-align: right;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .datetime .time {
            font-size: 22px;
            font-weight: 600;
        }
        
        .datetime .date {
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 20px;
            padding: 20px;
            min-height: calc(100vh - 90px);
        }
        
        /* Card Base */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .card-title .icon {
            font-size: 20px;
        }
        
        .card-body {
            padding: 16px;
        }
        
        /* Left Panel - Task Input */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .task-input-card {
            flex: 1;
        }
        
        .task-item {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid var(--ct-blue);
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            transform: translateX(4px);
            border-left-color: var(--ct-red);
        }
        
        .task-item.active {
            border-left-color: var(--success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        
        .task-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .task-source {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .task-source .badge {
            background: var(--ct-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .task-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .task-content {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .task-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .status-badge.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .status-badge.running { background: rgba(59, 130, 246, 0.2); color: var(--info); }
        .status-badge.completed { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-badge.failed { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        
        /* Center Panel - Agent Status & Progress */
        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Progress Section */
        .progress-card .card-body {
            padding: 20px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .progress-percent {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--ct-blue), var(--ct-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .progress-bar-container {
            background: var(--bg-dark);
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--ct-blue), var(--ct-blue-light), var(--ct-red-light), var(--ct-red));
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Agent Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }
        
        .agent-card {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .agent-card.active {
            border-color: var(--success);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }
        
        .agent-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--ct-blue), var(--ct-red));
            animation: slideIn 1.5s ease infinite;
        }
        
        @keyframes slideIn {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }
        
        .agent-avatar {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, var(--ct-blue), var(--ct-red));
        }
        
        .agent-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .agent-role {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .agent-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .agent-status.idle .dot { background: var(--text-muted); }
        .agent-status.working .dot { background: var(--success); animation: pulse 1s infinite; }
        .agent-status.waiting .dot { background: var(--warning); }
        .agent-status.error .dot { background: var(--error); }
        
        /* Right Panel - Logs & Output */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Logs */
        .log-container {
            flex: 1;
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            overflow-y: auto;
            max-height: 400px;
        }
        
        .log-entry {
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 6px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .log-entry.info { background: rgba(59, 130, 246, 0.1); }
        .log-entry.success { background: rgba(16, 185, 129, 0.1); }
        .log-entry.warning { background: rgba(245, 158, 11, 0.1); }
        .log-entry.error { background: rgba(239, 68, 68, 0.1); }
        
        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        .log-agent {
            color: var(--ct-blue-light);
            flex-shrink: 0;
            min-width: 80px;
        }
        
        .log-message {
            color: var(--text-primary);
            flex: 1;
        }
        
        /* Output Preview */
        .output-preview {
            flex: 1;
        }
        
        .output-list {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .output-item {
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .output-item:hover {
            border-color: var(--ct-blue);
            transform: translateX(4px);
        }
        
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .output-type {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .output-type .icon {
            font-size: 16px;
        }
        
        .output-filename {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .output-preview-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Refresh Button */
        .refresh-btn {
            background: linear-gradient(135deg, var(--ct-blue), var(--ct-red));
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(201, 56, 50, 0.3);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* Connection Status */
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }
        
        .connection-status.connected { color: var(--success); }
        .connection-status.disconnected { color: var(--error); }
        
        /* Responsive */
        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 280px 1fr 320px;
            }
        }
        
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .left-panel, .right-panel {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">🌟</div>
            <div class="header-title">
                <h1>九星智囊团 · 任务调度看板</h1>
                <p>Jiuxing Think Tank Task Dispatch Board</p>
            </div>
        </div>
        <div class="header-right">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>系统运行中</span>
            </div>
            <div class="datetime">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="date" id="currentDate">----年--月--日</div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container">
        <!-- Left Panel: Task Input -->
        <aside class="left-panel">
            <div class="card task-input-card">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">📥</span>
                        <span>任务输入</span>
                    </div>
                    <button class="refresh-btn" onclick="loadTasks()">
                        <span>🔄</span> 刷新
                    </button>
                </div>
                <div class="card-body">
                    <div id="taskList">
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无待处理任务</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Center Panel: Progress & Agents -->
        <section class="center-panel">
            <!-- Progress Card -->
            <div class="card progress-card">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">📊</span>
                        <span>执行进度</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="progress-header">
                        <span class="progress-label">整体完成度</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="statTotal">0</div>
                            <div class="stat-label">总任务</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="statRunning">0</div>
                            <div class="stat-label">执行中</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="statCompleted">0</div>
                            <div class="stat-label">已完成</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="statFailed">0</div>
                            <div class="stat-label">失败</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Agent Status Card -->
            <div class="card" style="flex: 1;">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">👥</span>
                        <span>团队状态</span>
                    </div>
                    <button class="refresh-btn" onclick="loadAgents()">
                        <span>🔄</span> 刷新
                    </button>
                </div>
                <div class="card-body">
                    <div class="agent-grid" id="agentGrid">
                        <!-- Agents will be loaded here -->
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Right Panel: Logs & Output -->
        <aside class="right-panel">
            <!-- Real-time Logs -->
            <div class="card" style="flex: 1;">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">📜</span>
                        <span>实时日志</span>
                    </div>
                    <button class="refresh-btn" onclick="clearLogs()">
                        <span>🗑️</span> 清空
                    </button>
                </div>
                <div class="card-body" style="padding: 10px;">
                    <div class="log-container" id="logContainer">
                        <div class="empty-state">
                            <div class="icon">📋</div>
                            <p>等待日志...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Output Preview -->
            <div class="card output-preview">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">📦</span>
                        <span>产出预览</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="output-list" id="outputList">
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无产出</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>
    
    <!-- Connection Status -->
    <div class="connection-status disconnected" id="connectionStatus">
        <span class="dot" style="width: 8px; height: 8px; border-radius: 50%; background: currentColor;"></span>
        <span>未连接</span>
    </div>

    <script>
        // Configuration
        const API_BASE = '/api/v15.2';
        let eventSource = null;
        let currentTaskId = null;
        
        // Agent definitions - 九星智囊团
        const AGENTS = [
            { id: 'nanqiao', name: '南乔', role: '用户助手', emoji: '🌿' },
            { id: 'caiwei', name: '采薇', role: '需求分析师', emoji: '🌸' },
            { id: 'zhijin', name: '织锦', role: '架构设计师', emoji: '🧵' },
            { id: 'zhutai', name: '筑台', role: '售前工程师', emoji: '🏗️' },
            { id: 'chengcai', name: '呈彩', role: '方案设计师', emoji: '🎨' },
            { id: 'gongchi', name: '工尺', role: '系统设计师', emoji: '📐' },
            { id: 'yuheng', name: '玉衡', role: '项目经理', emoji: '⚖️' },
            { id: 'zhegui', name: '折桂', role: '资源管家', emoji: '📚' },
            { id: 'fuyao', name: '扶摇', role: '总指挥', emoji: '🌀' }
        ];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            
            loadAgents();
            loadTasks();
            
            // Auto refresh every 10 seconds
            setInterval(() => {
                loadAgents();
                loadTasks();
            }, 10000);
        });
        
        // Update date time
        function updateDateTime() {
            const now = new Date();
            const timeEl = document.getElementById('currentTime');
            const dateEl = document.getElementById('currentDate');
            
            timeEl.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            dateEl.textContent = now.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
        }
        
        // Load tasks
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const data = await response.json();
                renderTasks(data.tasks || []);
                updateProgress(data.stats || {});
            } catch (error) {
                console.error('Failed to load tasks:', error);
                // Use mock data for demo
                renderMockTasks();
            }
        }
        
        // Render tasks
        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无待处理任务</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status === 'running' || task.status === 'in_progress' ? 'active' : ''}" 
                     onclick="selectTask('${task.task_id}')">
                    <div class="task-meta">
                        <div class="task-source">
                            <span class="badge">${task.source || 'QQ'}</span>
                            <span>${task.from || '用户'}</span>
                        </div>
                        <span class="task-time">${formatTime(task.created_at)}</span>
                    </div>
                    <div class="task-content">${task.title || task.description}</div>
                    <div class="task-status">
                        <span class="status-badge ${task.status}">${getStatusText(task.status)}</span>
                        ${task.agent ? `<span style="color: var(--text-muted)">→ ${task.agent}</span>` : ''}
                    </div>
                    ${task.progress ? `<div class="progress-bar"><div class="progress-fill" style="width: ${task.progress}%"></div></div>` : ''}
                </div>
            `).join('');
        }
        
        // Mock tasks for demo
        function renderMockTasks() {
            const mockTasks = [
                {
                    id: 'task-001',
                    source: 'QQ',
                    from: '少帅',
                    content: '帮我分析一下电信最新产品策略',
                    status: 'running',
                    agent: '南桥',
                    created_at: new Date().toISOString()
                },
                {
                    id: 'task-002',
                    source: 'QQ',
                    from: '用户A',
                    content: '生成一份周报模板',
                    status: 'pending',
                    created_at: new Date(Date.now() - 3600000).toISOString()
                }
            ];
            
            renderTasks(mockTasks);
            updateProgress({ total: 5, running: 1, completed: 3, failed: 0 });
        }
        
        // Update progress
        function updateProgress(stats) {
            const total = stats.total || 0;
            const running = stats.running || 0;
            const completed = stats.completed || 0;
            const failed = stats.failed || 0;
            
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('progressPercent').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statRunning').textContent = running;
            document.getElementById('statCompleted').textContent = completed;
            document.getElementById('statFailed').textContent = failed;
        }
        
        // Load agents
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const data = await response.json();
                renderAgents(data.agents || []);
            } catch (error) {
                console.error('Failed to load agents:', error);
                renderMockAgents();
            }
        }
        
        // Render agents
        function renderAgents(agents) {
            const container = document.getElementById('agentGrid');
            
            container.innerHTML = AGENTS.map(agent => {
                const agentData = agents.find(a => a.agent_id === agent.id);
                const status = agentData?.status || 'idle';
                return `
                    <div class="agent-card ${status === 'busy' || status === 'working' ? 'active' : ''}">
                        <div class="agent-avatar">${agent.emoji}</div>
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                        <div class="agent-status ${status}">
                            <span class="dot"></span>
                            <span>${getStatusText(status)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Mock agents for demo
        function renderMockAgents() {
            const mockStatus = ['working', 'idle', 'working', 'waiting', 'idle', 'working', 'idle', 'idle'];
            const container = document.getElementById('agentGrid');
            
            container.innerHTML = AGENTS.map((agent, i) => `
                <div class="agent-card ${mockStatus[i] === 'working' ? 'active' : ''}">
                    <div class="agent-avatar">${agent.emoji}</div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                    <div class="agent-status ${mockStatus[i]}">
                        <span class="dot"></span>
                        <span>${getStatusText(mockStatus[i])}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Select task and start SSE
        function selectTask(taskId) {
            currentTaskId = taskId;
            connectSSE(taskId);
            loadTaskOutputs(taskId);
        }
        
        // Connect SSE for real-time logs
        function connectSSE(taskId) {
            // Close existing connection
            if (eventSource) {
                eventSource.close();
            }
            
            const statusEl = document.getElementById('connectionStatus');
            
            try {
                eventSource = new EventSource(`${API_BASE}/tasks/${taskId}/logs/stream`);
                
                eventSource.onopen = () => {
                    statusEl.className = 'connection-status connected';
                    statusEl.innerHTML = '<span style="width: 8px; height: 8px; border-radius: 50%; background: currentColor;"></span><span>SSE 已连接</span>';
                    clearLogs();
                };
                
                eventSource.onmessage = (event) => {
                    try {
                        const log = JSON.parse(event.data);
                        appendLog(log);
                    } catch (e) {
                        // Plain text log
                        appendLog({ level: 'info', agent: 'System', message: event.data });
                    }
                };
                
                eventSource.onerror = () => {
                    statusEl.className = 'connection-status disconnected';
                    statusEl.innerHTML = '<span style="width: 8px; height: 8px; border-radius: 50%; background: currentColor;"></span><span>连接断开</span>';
                    
                    // Reconnect after 3 seconds
                    setTimeout(() => {
                        if (currentTaskId === taskId) {
                            connectSSE(taskId);
                        }
                    }, 3000);
                };
            } catch (error) {
                console.error('SSE connection failed:', error);
                statusEl.className = 'connection-status disconnected';
                statusEl.innerHTML = '<span style="width: 8px; height: 8px; border-radius: 50%; background: currentColor;"></span><span>连接失败</span>';
                
                // Use mock logs for demo
                startMockLogs();
            }
        }
        
        // Mock logs for demo
        function startMockLogs() {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'connection-status connected';
            statusEl.innerHTML = '<span style="width: 8px; height: 8px; border-radius: 50%; background: currentColor;"></span><span>模拟模式</span>';
            
            const mockLogs = [
                { level: 'info', agent: '系统', message: '任务已接收，开始分配...' },
                { level: 'info', agent: '南桥', message: '正在分析任务需求...' },
                { level: 'success', agent: '南桥', message: '需求分析完成，制定执行方案' },
                { level: 'info', agent: '呈彩', message: '开始设计方案...' },
                { level: 'info', agent: '清音', message: '准备生成内容框架...' },
                { level: 'success', agent: '呈彩', message: '方案设计完成' },
                { level: 'info', agent: '玲珑', message: '开始执行方案...' },
            ];
            
            let index = 0;
            const interval = setInterval(() => {
                if (index < mockLogs.length) {
                    appendLog(mockLogs[index]);
                    index++;
                } else {
                    clearInterval(interval);
                    appendLog({ level: 'success', agent: '系统', message: '任务执行完成！' });
                }
            }, 1500);
        }
        
        // Append log entry
        function appendLog(log) {
            const container = document.getElementById('logContainer');
            
            // Remove empty state
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry ${log.level || 'info'}`;
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-agent">[${log.agent}]</span>
                <span class="log-message">${log.message}</span>
            `;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // Clear logs
        function clearLogs() {
            const container = document.getElementById('logContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>等待日志...</p>
                </div>
            `;
        }
        
        // Load task outputs
        async function loadTaskOutputs(taskId) {
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`);
                const data = await response.json();
                renderOutputs(data.outputs || []);
            } catch (error) {
                console.error('Failed to load outputs:', error);
                renderMockOutputs();
            }
        }
        
        // Render outputs
        function renderOutputs(outputs) {
            const container = document.getElementById('outputList');
            
            if (outputs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无产出</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = outputs.map(output => `
                <div class="output-item" onclick="viewOutput('${output.path}')">
                    <div class="output-header">
                        <div class="output-type">
                            <span class="icon">${getFileIcon(output.type)}</span>
                            <span>${output.type || '文件'}</span>
                        </div>
                        <span class="output-filename">${output.filename || 'output'}</span>
                    </div>
                    <div class="output-preview-text">${output.preview || '点击查看详情...'}</div>
                </div>
            `).join('');
        }
        
        // Mock outputs for demo
        function renderMockOutputs() {
            const mockOutputs = [
                { type: '文档', filename: '产品策略分析.md', preview: '一、市场现状分析\n电信行业正处于转型升级的关键时期...' },
                { type: '方案', filename: '执行方案v1.pdf', preview: '基于市场分析，我们建议采取以下策略...' },
                { type: '数据', filename: '竞品对比.xlsx', preview: '包含5家主要竞争对手的产品对比数据...' }
            ];
            
            renderOutputs(mockOutputs);
        }
        
        // View output
        function viewOutput(path) {
            window.open(path, '_blank');
        }
        
        // Helper functions
        function formatTime(isoString) {
            if (!isoString) return '--:--';
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getStatusText(status) {
            const statusMap = {
                'idle': '待命',
                'online': '在线',
                'busy': '工作中',
                'working': '工作中',
                'waiting': '等待中',
                'error': '异常',
                'pending': '待处理',
                'running': '执行中',
                'in_progress': '执行中',
                'completed': '已完成',
                'failed': '失败',
                'cancelled': '已取消'
            };
            return statusMap[status] || status;
        }
        
        function getFileIcon(type) {
            const iconMap = {
                '文档': '📄',
                '方案': '📋',
                '数据': '📊',
                '图片': '🖼️',
                '代码': '💻',
                '其他': '📁'
            };
            return iconMap[type] || '📁';
        }
    </script>
</body>
</html>
