<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>预期效果指标 - Infographic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 1400px;
      width: 100%;
    }
    .title {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #1E40AF;
      margin-bottom: 40px;
      padding-bottom: 15px;
      border-bottom: 3px solid #C93832;
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }
    .metric-card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border: 2px solid #E5E7EB;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .metric-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .metric-card.highlight {
      border-color: #C93832;
      background: linear-gradient(135deg, #FEF2F2, #FFF);
    }
    .metric-icon {
      font-size: 40px;
      margin-bottom: 15px;
    }
    .metric-name {
      font-size: 16px;
      color: #6B7280;
      margin-bottom: 10px;
    }
    .metric-values {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 15px;
    }
    .value-box {
      text-align: center;
    }
    .value-label {
      font-size: 12px;
      color: #9CA3AF;
      margin-bottom: 5px;
    }
    .value-number {
      font-size: 24px;
      font-weight: bold;
    }
    .current { color: #EF4444; }
    .target { color: #10B981; }
    
    .metric-improve {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }
    .improve-down { background: linear-gradient(135deg, #10B981, #059669); }
    .improve-up { background: linear-gradient(135deg, #3B82F6, #1E40AF); }
    
    .arrow {
      font-size: 20px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">预期效果 - 六大核心指标</div>
    <div class="metrics-grid">
      <div class="metric-card highlight">
        <div class="metric-icon">⚡</div>
        <div class="metric-name">配案时间</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">30分钟</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">5分钟</div>
          </div>
        </div>
        <div class="metric-improve improve-down">↓ 83%</div>
      </div>
      
      <div class="metric-card">
        <div class="metric-icon">🔍</div>
        <div class="metric-name">规则查询时间</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">10分钟</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">30秒</div>
          </div>
        </div>
        <div class="metric-improve improve-down">↓ 95%</div>
      </div>
      
      <div class="metric-card">
        <div class="metric-icon">🎯</div>
        <div class="metric-name">套餐匹配准确率</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">85%</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">95%</div>
          </div>
        </div>
        <div class="metric-improve improve-up">↑ 10%</div>
      </div>
      
      <div class="metric-card">
        <div class="metric-icon">❌</div>
        <div class="metric-name">配案错误率</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">15%</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">3%</div>
          </div>
        </div>
        <div class="metric-improve improve-down">↓ 12%</div>
      </div>
      
      <div class="metric-card highlight">
        <div class="metric-icon">💰</div>
        <div class="metric-name">人力成本</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">150万</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">80万</div>
          </div>
        </div>
        <div class="metric-improve improve-down">↓ 47%</div>
      </div>
      
      <div class="metric-card">
        <div class="metric-icon">😊</div>
        <div class="metric-name">用户满意度</div>
        <div class="metric-values">
          <div class="value-box">
            <div class="value-label">现状</div>
            <div class="value-number current">70%</div>
          </div>
          <div class="arrow">→</div>
          <div class="value-box">
            <div class="value-label">目标</div>
            <div class="value-number target">90%</div>
          </div>
        </div>
        <div class="metric-improve improve-up">↑ 20%</div>
      </div>
    </div>
  </div>
</body>
</html>
