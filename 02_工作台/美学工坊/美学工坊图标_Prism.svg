<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00AA88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="40"/>

  <!-- 外圈装饰 -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#0066CC" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#00AA88" stroke-width="1.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.1"/>

  <!-- 主棱镜 -->
  <polygon points="200,60 300,200 200,340 100,200" fill="url(#prismGrad)" opacity="0.95" stroke="#FFD700" stroke-width="4" filter="url(#shadow)"/>

  <!-- 入射光线（白色光） -->
  <g opacity="0.95" filter="url(#glow)">
    <line x1="20" y1="140" x2="100" y2="175" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="20" y1="200" x2="100" y2="200" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="20" y1="260" x2="100" y2="225" stroke="#FFFFFF" stroke-width="5"/>
  </g>

  <!-- 折射彩虹光线 -->
  <g filter="url(#glow)">
    <line x1="300" y1="160" x2="380" y2="100" stroke="#FF6B6B" stroke-width="5"/>
    <line x1="300" y1="180" x2="380" y2="150" stroke="#FFE66D" stroke-width="5"/>
    <line x1="300" y1="200" x2="380" y2="200" stroke="#4ECDC4" stroke-width="5"/>
    <line x1="300" y1="220" x2="380" y2="250" stroke="#45B7D1" stroke-width="5"/>
    <line x1="300" y1="240" x2="380" y2="300" stroke="#96E6A1" stroke-width="5"/>
  </g>

  <!-- 中心核心 -->
  <circle cx="200" cy="200" r="30" fill="#FFD700" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="20" fill="#0A1929"/>
  <circle cx="200" cy="200" r="10" fill="#FFD700" opacity="0.9"/>

  <!-- 光芒效果 -->
  <g opacity="0.4" filter="url(#glow)">
    <line x1="200" y1="200" x2="200" y2="80" stroke="#FFD700" stroke-width="2"/>
    <line x1="200" y1="200" x2="280" y2="120" stroke="#FFD700" stroke-width="2"/>
    <line x1="200" y1="200" x2="280" y2="280" stroke="#FFD700" stroke-width="2"/>
    <line x1="200" y1="200" x2="120" y2="280" stroke="#FFD700" stroke-width="2"/>
    <line x1="200" y1="200" x2="120" y2="120" stroke="#FFD700" stroke-width="2"/>
  </g>
</svg>